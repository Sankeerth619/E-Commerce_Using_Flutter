name: shopkart
description: A production-level e-commerce app inspired by Amazon/Flipkart

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  badges: ^3.1.2
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
